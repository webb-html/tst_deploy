name: Run start.sh

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify start.sh exists
        run: ls -la start.sh

      - name: Make start.sh executable
        run: chmod +x start.sh

      - name: Execute start.sh
        run: ./start.sh   # именно ./ , а не просто start.sh
