{% extends "base.html" %}

{% block content %}
    <!-- для просмотра заметок, отделено от файла с редактированием заметки, тк с flask_wtf нет возможности использовать
    свойство disabled, тк оно из Bootstrap -->
    <head>
        <link rel='stylesheet' href="/static/css/main_style.css">
    </head>
    <div class="flex_div">
        <input class="button grow" placeholder="Заголовок" value='{{title}}' disabled/>
    </div>
    <div class="flex_div">
        <input class="button grow shift" placeholder="Папка" value='{{directory}}' disabled/>
        <input class="button grow" placeholder="Тема" value='{{type}}' disabled/>
    </div>
    <div class="flex_div">
        <div class="grow"></div>
        <img src="/static/img/download.svg" class="icon bar-icon" alt="загрузить"
                     onclick="document.location='/user/{{user_name}}/{{note_id}}/download'"/>
    </div>
    <div class="form-floating area">
        <textarea class="form-control" placeholder="Начните писать записку!" id="content-area"
                  style="min-height: 30em;" disabled>{{textarea}}</textarea>
        <label for="content-area">Содержание</label>
    </div>
    </form>
{% endblock %}
